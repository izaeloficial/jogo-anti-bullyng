<head>

<meta name="theme-color" content="#0d0221">
<meta name="description" content="Anti-Bullying Runner v2.0 Ultra — Endless Runner educativo estilo Subway Surfers sobre prevenção ao bullying.">

<!-- O arquivo CSS no repositório está nomeado como "style (2).css" -->
<link rel="stylesheet" href="style (2).css">
</head>
<body data-theme="arcade" data-lang="pt">

<div id="global-toolbar" class="global-toolbar hidden" aria-hidden="false">
  <button id="btn-mute" class="icon-btn" type="button" aria-label="Silenciar áudio" data-state="unmuted">
    <span class="icon-on">🔊</span>
    <span class="icon-off">🔇</span>
  </button>
  <button id="btn-fullscreen" class="icon-btn" type="button" aria-label="Tela cheia">

  </button>
</div>

<div id="app" class="app-root">

  <!-- content omitted for brevity in this commit: unchanged markup above -->

</div><!-- /#app -->

<script src="game.js" defer></script>
<!-- Shield integration moved inside index.html to keep only the main three files (index, CSS, game.js).
     This script patches activatePower and handleCollision so the shield attaches to the player
     and consumes one collision without reducing lives. Loaded after game.js (defer), so it
     safely augments existing functions. -->
<script>
(function(){
  'use strict';
  // keep references to original functions if they exist
  var origActivate = window.activatePower;
  var origHandleCollision = window.handleCollision;

  window.activatePower = function(type){
    try { if (typeof origActivate === 'function') origActivate(type); } catch(e){ console.warn('activatePower original failed', e); }

    try {
      if (type === 'shield') {
        var rs = window.runState || null;
        if (rs && rs.player) {
          rs.player.shieldActive = true;
          rs.player.shieldHits = 1;

          var el = document.querySelector('.powerup-indicator[data-power="shield"]');
          if (el) el.removeAttribute('hidden');

          if (typeof window.sfxPowerup === 'function') window.sfxPowerup();
          if (typeof window.spawnFloatingText === 'function') window.spawnFloatingText('Escudo ativado', window.innerWidth/2, 80, 'is-shield');
        } else {
          window.__pendingShield = (window.__pendingShield || 0) + 1;
        }
      }
    } catch (e) { console.warn('shield inline activate error', e); }
  };

  function applyPendingShield() {
    try {
      if (window.__pendingShield && window.runState && window.runState.player) {
        window.runState.player.shieldActive = true;
        window.runState.player.shieldHits = window.__pendingShield;
        delete window.__pendingShield;
        var el = document.querySelector('.powerup-indicator[data-power="shield"]');
        if (el) el.removeAttribute('hidden');
        if (typeof window.sfxPowerup === 'function') window.sfxPowerup();
        if (typeof window.spawnFloatingText === 'function') window.spawnFloatingText('Escudo ativado', window.innerWidth/2, 80, 'is-shield');
      }
    } catch (e) { console.warn(e); }
  }

  var runStateObserver = setInterval(function(){
    if (window.runState && window.runState.player) { applyPendingShield(); clearInterval(runStateObserver); }
  }, 300);

  window.handleCollision = function(rs){
    try {
      var player = (rs && rs.player) || (window.runState && window.runState.player) || null;
      if (player && player.shieldActive && player.shieldHits > 0) {
        player.shieldHits -= 1;
        player.shieldActive = false;
        if (typeof window.sfxShieldBreak === 'function') window.sfxShieldBreak();
        if (typeof window.spawnFloatingText === 'function') window.spawnFloatingText('+Escudo!', window.innerWidth/2, window.innerHeight/3, 'is-shield-break');
        try { document.querySelector('.powerup-indicator[data-power="shield"]')?.setAttribute('hidden', ''); } catch(e){}
        return;
      }
    } catch (e) { console.warn('shield inline collision check failed', e); }

    if (typeof origHandleCollision === 'function') return origHandleCollision(rs);
  };
})();
</script>
</body>
</html>
