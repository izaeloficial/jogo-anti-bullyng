<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0d0221">
<meta name="description" content="Anti-Bullying Runner v2.0 Ultra — Endless Runner educativo estilo Subway Surfers sobre prevenção ao bullying.">
<title>Anti-Bullying Runner v2.0 Ultra</title>
<link rel="stylesheet" href="./style.css">
</head>
<body data-theme="arcade" data-lang="pt">

<!-- BARRA SUPERIOR GLOBAL (mute / fullscreen) -->
<div id="global-toolbar" class="global-toolbar hidden" aria-hidden="false">
  <button id="btn-mute" class="icon-btn" type="button" aria-label="Silenciar áudio" data-state="unmuted">
    <span class="icon-on">🔊</span>
    <span class="icon-off">🔇</span>
  </button>
  <button id="btn-fullscreen" class="icon-btn" type="button" aria-label="Tela cheia">
    <span class="icon-on">⛶</span>
  </button>
</div>

<!-- CONTAINER PRINCIPAL DO JOGO -->
<div id="app" class="app-root">
  <!-- Canvas será criado dinamicamente por game.js -->
</div>

<!-- Script principal do jogo - tudo integrado -->
<script src="./game.js" defer></script>

<!-- Shield patch - Integração do escudo com o jogador -->
<script>
(function(){
  'use strict';
  
  // Aguardar que game.js carregue e estabeleça as funções
  var origActivate = null;
  var origHandleCollision = null;
  var patchAttempts = 0;
  
  function setupShieldPatch() {
    patchAttempts++;
    
    // Verificar se as funções estão disponíveis
    if (window.activatePower && window.handleCollision && window.spawnFloatingText && window.sfxPowerup && window.sfxShieldBreak) {
      origActivate = window.activatePower;
      origHandleCollision = window.handleCollision;
      
      // Override activatePower para suportar escudo
      window.activatePower = function(type){
        try { 
          if (typeof origActivate === 'function') origActivate(type); 
        } catch(e){ 
          console.warn('activatePower original failed', e); 
        }

        try {
          if (type === 'shield') {
            var rs = window.runState || null;
            if (rs && rs.player) {
              rs.player.shieldActive = true;
              rs.player.shieldHits = 1;
              
              if (typeof window.sfxPowerup === 'function') window.sfxPowerup();
              if (typeof window.spawnFloatingText === 'function') {
                window.spawnFloatingText('🛡️ Escudo!', window.innerWidth/2, 80, 'is-shield');
              }
            } else {
              // Se runState não existir, guardar para aplicar depois
              window.__pendingShield = (window.__pendingShield || 0) + 1;
            }
          }
        } catch (e) { 
          console.warn('shield patch activate error', e); 
        }
      };

      // Aplicar escudo pendente se existir
      function applyPendingShield() {
        try {
          if (window.__pendingShield && window.runState && window.runState.player) {
            window.runState.player.shieldActive = true;
            window.runState.player.shieldHits = window.__pendingShield;
            delete window.__pendingShield;
            if (typeof window.sfxPowerup === 'function') window.sfxPowerup();
            if (typeof window.spawnFloatingText === 'function') {
              window.spawnFloatingText('🛡️ Escudo ativado!', window.innerWidth/2, 80, 'is-shield');
            }
          }
        } catch (e) { 
          console.warn('applyPendingShield error', e); 
        }
      }

      // Observador para aplicar escudo pendente
      var runStateObserver = setInterval(function(){
        applyPendingShield();
        if (window.runState && window.runState.player) { 
          clearInterval(runStateObserver); 
        }
      }, 300);

      // Override handleCollision para proteger com escudo
      window.handleCollision = function(rs){
        try {
          var player = (rs && rs.player) || (window.runState && window.runState.player) || null;
          if (player && player.shieldActive && player.shieldHits > 0) {
            player.shieldHits -= 1;
            player.shieldActive = player.shieldHits > 0;
            
            if (typeof window.sfxShieldBreak === 'function') window.sfxShieldBreak();
            if (typeof window.spawnFloatingText === 'function') {
              window.spawnFloatingText('⚔️ Escudo ativado!', window.innerWidth/2, window.innerHeight/3, 'is-shield-break');
            }
            return; // Não propagar dano
          }
        } catch (e) { 
          console.warn('shield patch collision check failed', e); 
        }

        // Chamar implementação original
        if (typeof origHandleCollision === 'function') return origHandleCollision(rs);
      };
      
      return true; // Sucesso
    }
    
    // Se não conseguiu e não excedeu tentativas, tentar novamente
    if (patchAttempts < 50) {
      setTimeout(setupShieldPatch, 100);
    } else {
      console.warn('Shield patch: Could not initialize after 50 attempts');
    }
    
    return false;
  }
  
  // Iniciar patch
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupShieldPatch);
  } else {
    setupShieldPatch();
  }
  
  // Também tentar quando o game estiver pronto
  document.addEventListener('gameReady', setupShieldPatch);
})();
</script>

</body>
</html>
